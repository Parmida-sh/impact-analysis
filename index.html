<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Disk Wear on Glass</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f0f0f0; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        .content { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        .charts { display: grid; grid-template-rows: 400px 350px; gap: 15px; }
        .chart { background: #fafafa; border-radius: 6px; border: 1px solid #ddd; }
        .panel { background: #f9f9f9; padding: 15px; border-radius: 6px; border: 1px solid #ddd; }
        .param { margin-bottom: 15px; }
        .param-label { font-size: 12px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .param-value { color: #0066cc; font-weight: bold; }
        input[type="range"] { width: 100%; }
        button { width: 100%; padding: 10px; margin-top: 10px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0052a3; }
        .info { background: #e8f4f8; padding: 10px; border-radius: 4px; margin-top: 15px; font-size: 12px; line-height: 1.5; }
        .info-label { font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Steel Disk Wear Analysis on Glass Surface</h1>
        <div class="content">
            <div class="charts">
                <div id="wear2d" class="chart"></div>
                <div id="wearProfile" class="chart"></div>
            </div>
            <div class="panel">
                <div class="param">
                    <div class="param-label">
                        Wear Rate Multiplier
                        <span class="param-value" id="wearLabel">1.0</span>
                    </div>
                    <input type="range" id="wearSlider" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
                <div class="param">
                    <div class="param-label">
                        Friction Coefficient
                        <span class="param-value" id="fricLabel">0.5</span>
                    </div>
                    <input type="range" id="fricSlider" min="0.1" max="1.0" step="0.05" value="0.5">
                </div>
                <button onclick="updateCharts()">Update Analysis</button>
                <button onclick="resetParams()">Reset</button>
                <div class="info">
                    <div class="info-label">Parameters:</div>
                    Steel Disk: 15mm radius, 3mm thick, 60 HRC<br>
                    Glass: 120mm radius, 1mm thick, Gorilla<br>
                    Force: 20 kN<br>
                    Impacts: 100<br>
                    Angle: Perpendicular<br><br>
                    <div id="stats" style="background: white; padding: 8px; border-radius: 3px; margin-top: 8px;">
                        Max Wear: -- μm<br>
                        Avg Wear: -- μm
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DISK_RADIUS = 15;
        const GLASS_RADIUS = 120;
        const FORCE = 20000;
        const IMPACTS = 100;
        const HARDNESS = 9;

        function generateWearMap(wearRate, friction) {
            const points = 60;
            const z = [];
            const contactPressure = FORCE / (Math.PI * DISK_RADIUS * DISK_RADIUS);
            const baseWear = (IMPACTS * wearRate * contactPressure / 50000) * (1 + friction * 0.5);

            for (let i = 0; i < points; i++) {
                const row = [];
                for (let j = 0; j < points; j++) {
                    const x = (i - points/2) * (GLASS_RADIUS * 2 / points);
                    const y = (j - points/2) * (GLASS_RADIUS * 2 / points);
                    const dist = Math.sqrt(x * x + y * y);

                    let wear = 0;
                    if (dist <= DISK_RADIUS) {
                        wear = baseWear * Math.exp(-(dist * dist) / (2 * (DISK_RADIUS / 2) ** 2));
                    } else if (dist <= DISK_RADIUS * 2.5) {
                        const decay = (dist - DISK_RADIUS) / (DISK_RADIUS * 1.5);
                        wear = baseWear * Math.exp(-decay * decay) * 0.2;
                    }

                    wear = Math.max(0, wear / (HARDNESS / 5));
                    row.push(Math.min(wear, 100));
                }
                z.push(row);
            }
            return z;
        }

        function generateWearProfile(wearRate, friction) {
            const points = 120;
            const distances = [];
            const wears = [];
            const contactPressure = FORCE / (Math.PI * DISK_RADIUS * DISK_RADIUS);
            const baseWear = (IMPACTS * wearRate * contactPressure / 50000) * (1 + friction * 0.5);

            for (let i = 0; i < points; i++) {
                const dist = (i / points) * (GLASS_RADIUS * 1.5);
                distances.push(dist);

                let wear = 0;
                if (dist <= DISK_RADIUS) {
                    wear = baseWear * Math.exp(-(dist * dist) / (2 * (DISK_RADIUS / 2) ** 2));
                } else if (dist <= DISK_RADIUS * 2.5) {
                    const decay = (dist - DISK_RADIUS) / (DISK_RADIUS * 1.5);
                    wear = baseWear * Math.exp(-decay * decay) * 0.2;
                }

                wear = Math.max(0, wear / (HARDNESS / 5));
                wears.push(Math.min(wear, 100));
            }

            return { distances, wears };
        }

        function updateCharts() {
            const wearRate = parseFloat(document.getElementById('wearSlider').value);
            const friction = parseFloat(document.getElementById('fricSlider').value);

            document.getElementById('wearLabel').textContent = wearRate.toFixed(1);
            document.getElementById('fricLabel').textContent = friction.toFixed(2);

            // 2D Wear Map
            const z = generateWearMap(wearRate, friction);
            const maxWear = Math.max(...z.map(row => Math.max(...row)));
            const avgWear = z.flat().reduce((a, b) => a + b) / (z.length * z[0].length);

            const trace2d = {
                z: z,
                type: 'heatmap',
                colorscale: [
                    [0, 'rgb(49, 54, 149)'],
                    [0.25, 'rgb(69, 117, 180)'],
                    [0.5, 'rgb(171, 217, 233)'],
                    [0.75, 'rgb(254, 224, 144)'],
                    [1, 'rgb(244, 109, 67)']
                ],
                zmin: 0,
                zmax: 100,
                colorbar: { title: 'μm' }
            };

            Plotly.newPlot('wear2d', [trace2d], {
                title: 'Wear Depth Distribution (Top View)',
                xaxis: { title: 'X (mm)' },
                yaxis: { title: 'Y (mm)' },
                height: 400,
                margin: { l: 50, r: 80, t: 40, b: 40 }
            }, { responsive: true });

            // Profile
            const prof = generateWearProfile(wearRate, friction);
            const traceProfile = {
                x: prof.distances,
                y: prof.wears,
                type: 'scatter',
                mode: 'lines',
                line: { color: 'rgb(244, 109, 67)', width: 3 },
                fill: 'tozeroy',
                fillcolor: 'rgba(244, 109, 67, 0.3)'
            };

            Plotly.newPlot('wearProfile', [traceProfile], {
                title: 'Cross-Section Wear Profile',
                xaxis: { title: 'Distance from Center (mm)' },
                yaxis: { title: 'Wear Depth (μm)' },
                height: 350,
                margin: { l: 50, r: 40, t: 40, b: 40 }
            }, { responsive: true });

            document.getElementById('stats').innerHTML = 
                `Max Wear: ${maxWear.toFixed(2)} μm<br>Avg Wear: ${avgWear.toFixed(2)} μm`;
        }

        function resetParams() {
            document.getElementById('wearSlider').value = 1.0;
            document.getElementById('fricSlider').value = 0.5;
            updateCharts();
        }

        updateCharts();
    </script>
</body>
</html>
