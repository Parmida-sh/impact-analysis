<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steel Disk Wear Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f0f0f0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 8px; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; }
        .content { display: grid; grid-template-columns: 1fr 250px; gap: 20px; }
        .canvas-container { background: #fafafa; padding: 10px; border-radius: 6px; margin-bottom: 15px; }
        canvas { max-width: 100%; }
        .controls { background: #f9f9f9; padding: 15px; border-radius: 6px; border: 1px solid #ddd; }
        .param { margin-bottom: 15px; }
        .param-label { font-weight: bold; font-size: 13px; margin-bottom: 5px; }
        .param-value { color: #0066cc; font-weight: bold; font-size: 14px; }
        input[type="range"] { width: 100%; height: 6px; border-radius: 3px; background: #ddd; outline: none; }
        button { width: 100%; padding: 10px; margin-top: 8px; border: none; border-radius: 4px; background: #0066cc; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #0052a3; }
        .info { font-size: 11px; margin-top: 15px; padding: 10px; background: #fffacd; border-radius: 4px; }
        .wear-map { width: 100%; height: 300px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Steel Disk Wear on Glass - 15mm disk, 120mm glass, 20kN, 100 impacts</h1>
        
        <div class="content">
            <div>
                <div class="canvas-container">
                    <canvas id="wearMap" class="wear-map"></canvas>
                </div>
                <div class="canvas-container">
                    <canvas id="profileChart"></canvas>
                </div>
            </div>

            <div class="controls">
                <div class="param">
                    <div class="param-label">Wear Rate</div>
                    <input type="range" id="wearRate" min="0.5" max="3" step="0.1" value="1">
                    <div class="param-value" id="wearVal">1.0x</div>
                </div>

                <div class="param">
                    <div class="param-label">Friction Coeff</div>
                    <input type="range" id="friction" min="0.1" max="1" step="0.05" value="0.5">
                    <div class="param-value" id="fricVal">0.50</div>
                </div>

                <button onclick="updateCharts()">Update</button>
                <button onclick="reset()">Reset</button>

                <div class="info">
                    <strong>Max Wear:</strong> <span id="maxWear">0</span> μm<br>
                    <strong>Avg Wear:</strong> <span id="avgWear">0</span> μm<br>
                    <strong>Volume Loss:</strong> <span id="volLoss">0</span> mm³
                </div>
            </div>
        </div>
    </div>

    <script>
        const DISK_R = 15;
        const GLASS_R = 120;
        const FORCE = 20000;
        const IMPACTS = 100;

        let wearMapCanvas, profileCanvas;
        let wearMapCtx, profileCtx;

        function generateWearData(wearRate, friction) {
            const contactPressure = FORCE / (Math.PI * DISK_R * DISK_R);
            const baseWear = (IMPACTS * wearRate * contactPressure / 10000) * (1 + friction * 0.3);
            
            const data = [];
            for (let i = 0; i < 100; i++) {
                for (let j = 0; j < 100; j++) {
                    const x = -GLASS_R + (i / 100) * GLASS_R * 2;
                    const y = -GLASS_R + (j / 100) * GLASS_R * 2;
                    const dist = Math.sqrt(x * x + y * y);
                    let wear = 0;
                    
                    if (dist <= DISK_R) {
                        wear = baseWear * Math.exp(-(dist * dist) / (2 * (DISK_R / 2) ** 2));
                    } else if (dist <= DISK_R * 2) {
                        const decay = (dist - DISK_R) / DISK_R;
                        wear = baseWear * Math.exp(-decay * decay) * 0.3;
                    }
                    data.push(Math.min(Math.max(wear, 0), 100));
                }
            }
            return data;
        }

        function generateProfileData(wearRate, friction) {
            const contactPressure = FORCE / (Math.PI * DISK_R * DISK_R);
            const baseWear = (IMPACTS * wearRate * contactPressure / 10000) * (1 + friction * 0.3);
            
            const labels = [];
            const wears = [];
            for (let i = 0; i < 150; i++) {
                const d = (i / 150) * GLASS_R * 1.5;
                labels.push(d.toFixed(1));
                let w = 0;
                
                if (d <= DISK_R) {
                    w = baseWear * Math.exp(-(d * d) / (2 * (DISK_R / 2) ** 2));
                } else if (d <= DISK_R * 2) {
                    const decay = (d - DISK_R) / DISK_R;
                    w = baseWear * Math.exp(-decay * decay) * 0.3;
                }
                wears.push(Math.min(Math.max(w, 0), 100));
            }
            return { labels, wears };
        }

        function drawWearMap(data) {
            const canvas = document.getElementById('wearMap');
            canvas.width = 300;
            canvas.height = 300;
            const ctx = canvas.getContext('2d');
            
            const imageData = ctx.createImageData(100, 100);
            const colors = data.map(val => {
                let r, g, b;
                if (val < 25) {
                    r = 49; g = 54; b = 149;
                } else if (val < 50) {
                    r = 171; g = 217; b = 233;
                } else if (val < 75) {
                    r = 254; g = 224; b = 144;
                } else {
                    r = 244; g = 109; b = 67;
                }
                return [r, g, b, 255];
            });
            
            for (let i = 0; i < data.length; i++) {
                const [r, g, b, a] = colors[i];
                imageData.data[i * 4] = r;
                imageData.data[i * 4 + 1] = g;
                imageData.data[i * 4 + 2] = b;
                imageData.data[i * 4 + 3] = a;
            }
            
            ctx.putImageData(imageData, 0, 0);
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(150, 150, 50, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawProfile(labels, wears) {
            const ctx = document.getElementById('profileChart').getContext('2d');
            
            if (window.profileChart) window.profileChart.destroy();
            
            window.profileChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Wear Depth (μm)',
                        data: wears,
                        borderColor: 'rgb(244, 109, 67)',
                        backgroundColor: 'rgba(244, 109, 67, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: true }, title: { display: true, text: 'Cross-Section Wear Profile' } },
                    scales: { y: { beginAtZero: true, max: 100, title: { display: true, text: 'Wear (μm)' } }, x: { title: { display: true, text: 'Distance (mm)' } } }
                }
            });
        }

        function updateCharts() {
            const wearRate = parseFloat(document.getElementById('wearRate').value);
            const friction = parseFloat(document.getElementById('friction').value);
            
            document.getElementById('wearVal').textContent = wearRate.toFixed(1) + 'x';
            document.getElementById('fricVal').textContent = friction.toFixed(2);
            
            const wearData = generateWearData(wearRate, friction);
            drawWearMap(wearData);
            
            const profile = generateProfileData(wearRate, friction);
            drawProfile(profile.labels, profile.wears);
            
            const maxWear = Math.max(...wearData);
            const avgWear = wearData.reduce((a, b) => a + b) / wearData.length;
            const volLoss = (maxWear / 1000) * Math.PI * DISK_R * DISK_R;
            
            document.getElementById('maxWear').textContent = maxWear.toFixed(1);
            document.getElementById('avgWear').textContent = avgWear.toFixed(1);
            document.getElementById('volLoss').textContent = volLoss.toFixed(3);
        }

        function reset() {
            document.getElementById('wearRate').value = 1;
            document.getElementById('friction').value = 0.5;
            updateCharts();
        }

        document.getElementById('wearRate').addEventListener('input', () => {
            document.getElementById('wearVal').textContent = document.getElementById('wearRate').value + 'x';
        });

        document.getElementById('friction').addEventListener('input', () => {
            document.getElementById('fricVal').textContent = parseFloat(document.getElementById('friction').value).toFixed(2);
        });

        updateCharts();
    </script>
</body>
</html>
